<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="shortcut icon" href={{ url_for('static', filename='img/Screenshot_2024-03-10_23-25-16-removebg-preview.png') }} type="image/x-icon">
    <link rel="stylesheet" href={{ url_for('static', filename='css/forgot-password.css') }}>
  </head>
  <body>
    <div class="container-fluid">
      <br>
      <br>
      <br>
      <section class="border-forgot-password bg-dark mx-auto rounded shadow-lg border">
        <div class="border border-0 rounded border-img">
          <img src={{ url_for('static', filename='img/Black_Circle_Icon_Internet_Logo-removebg-preview.png') }} alt="" srcset="">
        </div>
        <h1 class="text-light me-3 ms-3 mt-3 mb-3 text-center fw-bold text-title">Welcome Back</h1>
        <p class="me-3 ms-3 mt-3 mb-3 text-center description-forgot-password">Please Enter Your Account Details</p>
        <form class="m-3 text-light" method="post">
          <div class="mb-3">
            <label for="exampleInputEmail1" class="form-label">Password</label>
            <input type="password" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" name="password">
            {% if password_error %}
              <p class="text-danger">{{ password_error }}</p>
            {% endif %} 
          </div>
          <div class="mb-3">
            <label for="exampleInputPassword1" class="form-label">Confirm Password</label>
            <input type="password" class="form-control" id="exampleInputPassword1" name="confirm_password">
            {% if password_error %}
              <p class="text-danger">{{ password_error }}</p>
            {% endif %} 
          </div>
          <button type="submit" class="btn btn-primary mb-3">Submit</button>
        </form>
      </section>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  </body>
</html>
